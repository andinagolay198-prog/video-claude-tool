services:
  video-claude-backend:
    image: video-claude-tool-video-claude-backend:latest
    container_name: video-claude-backend
    restart: unless-stopped
    privileged: true
    ports:
      - "8765:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ALLOWED_ORIGINS=http://192.168.100.2:8766,http://localhost:8766
    volumes:
      - whisper-cache:/root/.cache/whisper
      - /tmp:/tmp
      - /data:/data
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1 --timeout-keep-alive 600
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 30s

  video-claude-frontend:
    image: nginx:alpine
    container_name: video-claude-frontend
    restart: unless-stopped
    privileged: true
    ports:
      - "8766:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  whisper-cache:

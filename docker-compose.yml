services:
  video-claude-backend:
    build: .
    container_name: video-claude-backend
    restart: unless-stopped
    privileged: true
    ports:
      - "8765:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - whisper-cache:/root/.cache/whisper
      - /tmp:/tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  video-claude-frontend:
    image: nginx:alpine
    container_name: video-claude-frontend
    restart: unless-stopped
    privileged: true
    ports:
      - "8766:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      video-claude-backend:
        condition: service_healthy

volumes:
  whisper-cache:
